name: Bug Report
description: Report a confirmed bug, regression, or broken workflow in DOCSight
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        If you are still unsure whether this is a bug, a setup issue, a reverse proxy problem, or a modem-specific limitation, please start in [Q&A Discussions](https://github.com/itsDNNS/docsight/discussions/categories/q-a) first.

        For new modem support, please use the dedicated modem support request form instead of this template.

  - type: dropdown
    id: bug_type
    attributes:
      label: Bug Type
      description: What kind of problem is this?
      options:
        - Regression (worked before, broken now)
        - New bug / unexpected behavior
        - UI / visual issue
        - Performance problem
        - Data quality / analysis issue
        - Integration issue
    validations:
      required: true

  - type: dropdown
    id: affected_area
    attributes:
      label: Affected Area
      description: Which part of DOCSight is affected most?
      options:
        - Monitoring dashboard
        - Signal trends / channel analysis
        - Event log / incident journal
        - Connection monitor / network analysis
        - Complaint / export workflow
        - Speedtest / BQM / BNetzA
        - Home Assistant / MQTT / Prometheus
        - Setup / configuration / auth
        - Reverse proxy / deployment
        - Other
    validations:
      required: true

  - type: dropdown
    id: version
    attributes:
      label: DOCSight Version
      description: Which version are you using?
      options:
        - Latest release
        - Older release (specified below)
        - Main / self-built checkout
        - Not sure
    validations:
      required: true

  - type: input
    id: version_specific
    attributes:
      label: Exact Version or Commit
      description: Fill this in if you are not on the latest release
      placeholder: e.g. v2026-04-20.1 or commit SHA

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      description: How are you running DOCSight?
      options:
        - Docker Compose
        - docker run
        - Unraid
        - Synology NAS
        - Proxmox / LXC / VM
        - Python / local checkout
        - Other
    validations:
      required: true

  - type: dropdown
    id: modem_mode
    attributes:
      label: Hardware Path
      description: What is DOCSight connected to?
      options:
        - Supported DOCSIS cable modem/router
        - Generic Router mode (fiber / DSL / satellite)
        - Demo mode only
        - Not sure
    validations:
      required: true

  - type: input
    id: modem_model
    attributes:
      label: Modem / Router Model
      description: Include the exact modem/router model when relevant
      placeholder: e.g. FRITZ!Box 6690 Cable, Vodafone Station TG3442DE

  - type: dropdown
    id: reproducibility
    attributes:
      label: Reproducibility
      description: How often does this happen?
      options:
        - Always
        - Often
        - Intermittently
        - Happened once so far
        - Not sure yet
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Give a short, concrete summary of the bug
      placeholder: After opening Signal Trends, the chart area stays blank and the browser console shows an error.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Tell us exactly how to reproduce it
      placeholder: |
        1. Open DOCSight
        2. Go to Signal Trends
        3. Change the period to 30 days
        4. See the broken chart
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: The chart should render the selected time range.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      placeholder: The chart area stays empty and no data points are rendered.
    validations:
      required: true

  - type: dropdown
    id: demo_mode
    attributes:
      label: Does this also happen in Demo Mode?
      description: This helps separate product bugs from device-specific data issues
      options:
        - Yes
        - No
        - I could not test Demo Mode
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Console Errors
      description: Paste relevant logs here. Redact secrets, IPs, tokens, and customer data if needed.
      render: shell
      placeholder: |
        [ERROR] docsis.main: ...
        Uncaught TypeError: ...

  - type: textarea
    id: evidence
    attributes:
      label: Screenshots, Exports, or Extra Context
      description: Add screenshots, exported snippets, or any additional context that helps explain the bug
      placeholder: This started after updating from v2026-04-12.2 to v2026-04-20.1.
