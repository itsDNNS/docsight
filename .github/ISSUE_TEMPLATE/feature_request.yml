name: Feature Request
description: Propose a feature, workflow improvement, or integration for DOCSight
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the feature request.

        Please check the [Roadmap](https://github.com/itsDNNS/docsight/wiki/Roadmap) first.
        If you want to discuss scope, tradeoffs, or rough direction before opening a formal request, start in [Ideas Discussions](https://github.com/itsDNNS/docsight/discussions/categories/ideas).

  - type: dropdown
    id: request_type
    attributes:
      label: Request Type
      description: What kind of request is this?
      options:
        - New feature
        - Improvement to an existing workflow
        - New integration
        - New analysis / visualization
        - Export / complaint workflow improvement
        - API / automation improvement
        - Other
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Monitoring dashboard
        - Signal trends / channel analysis
        - Event log / incident journal
        - Connection monitor / gaming quality
        - Complaint / report / export workflow
        - Speedtest / BQM / BNetzA
        - Home Assistant / MQTT / Prometheus
        - Setup / configuration / auth
        - Modules / extensibility
        - API / automation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What problem are you trying to solve?
      placeholder: |
        I can see that my connection degrades over time, but I cannot easily compare two ISP maintenance windows in one export.
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or improvement you want to see
      placeholder: |
        Add a comparison export that lets me select two time ranges and attach the result directly to a complaint PDF.
    validations:
      required: true

  - type: textarea
    id: why_now
    attributes:
      label: Why This Matters
      description: Who benefits, and what gets easier or better?
      placeholder: |
        This would help users prove recurring issues more clearly when their ISP keeps asking for before/after evidence.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or Workarounds Considered
      description: Have you tried another path already?
      placeholder: |
        Right now I export multiple screenshots and manually combine them.

  - type: dropdown
    id: deployment_context
    attributes:
      label: Where Would You Use It?
      options:
        - DOCSIS cable setup
        - Generic Router mode
        - Both
        - Not sure
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: I can help with
      options:
        - label: Testing
        - label: UX feedback
        - label: Documentation
        - label: Code / PR

  - type: textarea
    id: context
    attributes:
      label: Extra Context, Mockups, or References
      description: Add screenshots, links, examples, or sketches if helpful
      placeholder: A similar workflow exists in ...
