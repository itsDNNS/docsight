name: Full browser E2E

on:
  schedule:
    - cron: "23 3 * * 1"
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

jobs:
  changes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      browser: ${{ steps.filter.outputs.browser }}
    steps:
      - name: Filter browser-relevant changes
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            browser:
              - 'app/templates/**'
              - 'app/static/**'
              - 'app/modules/**'
              - 'app/web.py'
              - 'tests/e2e/**'
              - 'requirements.txt'
              - '.github/workflows/full-e2e.yml'

  full-e2e:
    needs: changes
    if: >-
      !cancelled() &&
      (
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        contains(github.event.pull_request.labels.*.name, 'full-e2e') ||
        needs.changes.outputs.browser == 'true'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements-test.txt
          pip install pytest-playwright==0.7.2 playwright==1.58.0
          python -m playwright install --with-deps chromium

      - name: Run full browser E2E suite
        run: TZ=UTC python -m pytest -q tests/e2e --tb=short

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: full-e2e-artifacts
          if-no-files-found: ignore
          path: |
            test-results/
            playwright-report/
            tests/e2e/screenshots/
