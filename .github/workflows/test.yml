name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install --require-hashes -r requirements-test.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --ignore=tests/e2e

  mobile-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --require-hashes -r requirements-test.txt
          pip install pytest-playwright==0.7.2 playwright==1.58.0
          python -m playwright install --with-deps chromium

      - name: Run mobile viewport quality gate
        run: TZ=UTC python -m pytest -q tests/e2e/test_mobile_quality_gate.py --tb=short

  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Audits production deps only; test deps (requirements-test.txt) are
      # hash-pinned and do not ship in the Docker image.
      - name: Audit dependencies for known vulnerabilities
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          inputs: requirements.txt

  i18n:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.13"

      - name: Validate translations
        run: python scripts/i18n_check.py --validate
